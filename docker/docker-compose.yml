version: '3.8'

services:
  naics-api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "5000:5000"
    environment:
      - DATABASE_TYPE=postgresql
      - POSTGRES_HOST=postgres
      - POSTGRES_USER=naics_user
      - POSTGRES_PASSWORD=naics_password
      - POSTGRES_DB=naics_classification
      - REDIS_HOST=redis
      - ENABLE_CACHING=true
    depends_on:
      - postgres
      - redis
    volumes:
      - ../data:/app/data
      - ../logs:/app/logs
    restart: unless-stopped

  postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=naics_user
      - POSTGRES_PASSWORD=naics_password
      - POSTGRES_DB=naics_classification
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - ../static:/app/static
    depends_on:
      - naics-api
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
